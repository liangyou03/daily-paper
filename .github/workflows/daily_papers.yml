name: Daily Paper Digest

on:
  schedule:
    # UTC 12:00 = 宾州时间 08:00 (EDT) / 07:00 (EST)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai feedparser requests

      - name: Run daily paper digest
        env:
          GLM_API_KEY:       ${{ secrets.GLM_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
        run: python daily_papers.py

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.md
          git diff --cached --quiet || (git commit -m "📚 update history $(date +%Y-%m-%d)" && git push)
